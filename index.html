<!DOCTYPE html>
<html lang="it">

<head>
	<meta http-equiv="Cache-Control" content="no-cache">
	<link rel="manifest" href="manifest.json?v=2">
	<meta name="apple-mobile-web-app-title" content="Starbene">
	<link rel="icon" href="icon-192.png">
	<link rel="apple-touch-icon" href="icon-192.png">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="style-mobile.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scheda Starbene</title>
</head>

<body>
	<!--Logo-->
	<header>
		<img src="logo.PNG">
	</header>

	<!--Sidebar-->
	<aside><input class="search" placeholder="Cerca esercizio..." oninput="render()">
		<div class="filters" id="filters"></div>
	</aside>

	<!--Contenuto-->
	<main>

		<!--Linguette-->
		<div class="tab-labels">
			<div onclick="showTab('esercizi')" id="tabE" class="active">
				<svg viewBox="0 0 24 24">
					<path d="M3 10V14M6 8V16 10V14 10V14M18 8V16M21 10V14M6 12H18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />

				</svg>
				<span>Esercizi</span>
			</div>

			<div onclick="showTab('scheda')" id="tabS">
				<svg viewBox="0 0 24 24">
					<path d="M8 6H20M8 12H20M8 18H20M4 6H4.01M4 12H4.01M4 18H4.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

				</svg>
				<span>La Mia Scheda</span>
			</div>
		</div>

		<!--Schermate-->
		<div class="tab-views">
			<div class="tab-view tab-view-esercizi">
				<div class="lista-esercizi">
					<div class="card-esercizio">
						<span>Retroversioni del bacino in quadrupedia</span>
						<div class="button"><svg viewBox="0 0 24 24">
								<path d="M12 5V19M5 12H19" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
							</svg></div>
						<img src="https://github.com/HollowDem0n/scheda-palestra/blob/main/images/tapis.png?raw=true" alt="">
					</div>

				</div>
			</div>
			<div class="tab-view" style="display:none;">
				<div class="button" onclick="resetScheda()">
					<svg viewBox="0 0 24 24">
						<path d="M3.508 6.726c1.765-2.836 4.911-4.726 8.495-4.726 5.518 0 9.997 4.48 9.997 9.997 0 5.519-4.479 9.999-9.997 9.999-5.245 0-9.553-4.048-9.966-9.188-.024-.302.189-.811.749-.811.391 0 .715.3.747.69.351 4.369 4.012 7.809 8.47 7.809 4.69 0 8.497-3.808 8.497-8.499 0-4.689-3.807-8.497-8.497-8.497-3.037 0-5.704 1.597-7.206 3.995l3 .005c.414 0 .75.336.75.75s-.336.75-.75.75h-5.2c-.414 0-.75-.336-.75-.75v-5.2c0-.414.336-.75.75-.75s.75.335.75.75z" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
					</svg>
					Reset
				</div>
				<div id="scheda"></div>
			</div>
		</div>



	</main>


</body>

</html>
