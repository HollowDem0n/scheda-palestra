<head>

<title>Scheda Starbene</title>

<style>

button{
  border: none;
  background: none;
  padding: 0;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  font: inherit;
  cursor: pointer;
}
  
:root{
--bg:#000;
--card:#1c1c1e;
--accent:#ffd600;
--text:#fff;
}

.done{
opacity:0.5;
filter:grayscale(0.6);
}

.done b{
text-decoration:line-through;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:
  radial-gradient(circle at 10% 10%, #2a2a2a, transparent 35%),
  radial-gradient(circle at 90% 20%, #222, transparent 35%),
  linear-gradient(180deg, #0a0a0a 0%, #000 100%);
color:white;}

.header{
padding:15px;
text-align:center;
font-size:22px;
font-weight:700;
}

.layout{
  display:block;
  transition: padding-top 0.2s ease;
  padding-top:100px;
}
.sidebar{
  padding:10px;
  position:sticky;   
  top:100px;      
  z-index:999;       
  background:#000;  
}
  .sidebar.glass{
background: rgba(20,20,20,0.45);
backdrop-filter: blur(16px) saturate(150%);
-webkit-backdrop-filter: blur(16px) saturate(150%);
border-bottom:none;
box-shadow: none;
}
.search{
width:100%;
padding:12px 16px;
border-radius:999px;
border:none;
background: rgba(20,20,20,0.45);
backdrop-filter: blur(16px) saturate(150%);
-webkit-backdrop-filter: blur(16px) saturate(150%);
color:white;
margin-bottom:10px;
font-size:20px; 
}
@media(max-width:600px){
  .search{
    padding:14px 18px;
    font-size:20px;
  }

.search, .filters{
  transition: all 0.25s ease;
}
  
  .filters{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:6px 4px;
  }

  .filter{
    width:auto;        /* 👈 FIX PRINCIPALE */
  }
 .tabs{
  margin-top:0px;
  padding:6px 10px 10px;
    }
  .sidebar{
  position:sticky;
  top:0;
  z-index:999;
  background:#000;
  padding:8px 6px;
}
  /* 👇 SHRINK SOLO MOBILE */
.sidebar.shrink .search{
  transform: scale(0.9);
  width:100%;
  margin-bottom:6px;
}

.sidebar.shrink .filters{
 transform: scale(0.9);
  width:100%;
}

/* transizione smooth */
.search, .filters{
  transition: all 0.25s ease;
}

body{
  background:#000 !important;
}  
  
}

.filters{
  display:flex;
  gap:8px;
  overflow:auto;
  -webkit-overflow-scrolling: touch;
  padding:6px 4px 2px;
  background: transparent;
}
  .sidebar.glass .search{
  background: transparent;
}

.sidebar.glass .filters{
  background: transparent;
}
 
.filter{
  display:flex;
  align-items:center;
  justify-content:center;

  width:100%;              
  text-align:center;
  padding:10px 16px; 

  height:44px;
  margin-bottom:10px;

  border-radius:999px;
  background:#2c2c2e;

  font-size:16px;
  font-weight:600;

  cursor:pointer;
  white-space:nowrap;

  transition: transform 0.15s ease, background 0.2s;
}
.filter.active{
  transform: scale(1.03);
}
  
.filter.active{
  background:var(--accent);
  color:black;
}

.tabs button.active{
  background:var(--accent);
  color:black;
  box-shadow:0 4px 12px rgba(255,214,0,0.3);
}

.tabs{
display:flex;
gap:10px;
padding:10px;
border-radius:999px;
}

.tabs button{
flex:1;

display:flex;
align-items:center;
justify-content:center;
gap:8px;

padding:12px 16px; /* 👈 più aria */

border:none;
border-radius:999px; /* 👈 pill vera */
background:#2c2c2e;
color:white;
font-weight:600;
}
.tabs button svg{
  width:24px;
  height:24px;
  stroke-width:2.8;
}

.tabs button span{
  font-size:18px;
  font-weight:600;
}

/* MOBILE */
@media(max-width:600px){
  .tabs button{
    gap:6px;
    padding:10px;
  }
  
  .tabs button svg{
    width:22px;
    height:22px;
  }


  .tabs button span{
    font-size:18px;
    font-weight:600;
  }
}

/* DESKTOP */
.tabs .active{
background:var(--accent);
color:black;
}

.content{
  padding:26px 10px 16px;
  margin-top:0px;
}

#app{
display:grid;
grid-template-columns:1fr;
gap:20px;
}
#scheda{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
  gap:20px;
}
  #app, #scheda{
  padding-bottom:20px;
}
.card{
background:var(--card);
border-radius:20px;
padding:14px;
  display:flex;                /* 👈 AGGIUNGI */
flex-direction:column;       /* 👈 AGGIUNGI */

gap:12px;  
box-shadow:0 6px 20px rgba(0,0,0,0.4);
position: relative;
cursor:pointer;
margin-bottom:0;
transition: 
transform 0.25s ease,
box-shadow 0.25s ease,
background 0.25s ease
}

/* ===== HOVER CARD ===== */
.card:hover{
  transform: translateY(-3px) scale(1.01);

  box-shadow:
  0 10px 25px rgba(0,0,0,0.5),
  0 0 0 1px rgba(255,214,0,0.06),
  0 0 12px rgba(255,214,0,0.12);
}

/* ===== CLICK FEEDBACK ===== */
.card:active{
  transform: scale(0.98);
}

.card img{
  width:100%;
  height:180px;              
  object-fit:contain;         
  transform: scale(1.25); 
  object-position:center 60%;
  border-radius:14px;
  background: radial-gradient(circle, #1a1a1a, #0f0f0f);
  display:block;
  padding:0;                
}

.card{
  overflow:hidden;
}
   .card img{
    transform: scale(1.15);
    object-position:center 60%;
     transition: transform 0.3s ease;
  }
  /* ===== CONTENITORE IMMAGINE ===== */
.img-box{
  height:180px;
  border-radius:14px;

  margin:0; 
  overflow:hidden;   /* 👈 BLOCCA LO SBORDO */
  position: relative;
  display:flex;
  align-items:center;
  justify-content:center;

  background: radial-gradient(circle, #1a1a1a, #0f0f0f);
}

/* ===== IMMAGINE ===== */
.img-box img{
  width:100%;
  height:100%;

  object-fit:contain;
top: 2px;
  transform: scale(1.2);
 transform-origin:center center; /* 👈 FIX IMPORTANTISSIMO */

  margin:auto;

  transition: transform 0.3s ease;
}

/* ===== HOVER ===== */
.card:hover .img-box img{
  transform: scale(1.3);
}

input,textarea{
width:100%;
margin-top:6px;
background:#2c2c2e;
border:none;
border-radius:12px;
padding:10px;
color:white;
}

.label{
font-size:11px;
color:#aaa;
margin-top:6px;
}

@media(min-width:1000px){
  .tabs button svg{
    width:22px;
    height:22px;
  }


  .tabs button span{
    font-size:17px;
  }
 
.layout{
  display:grid;
  grid-template-columns:280px 1fr; /* 👈 più compatta */
}

.sidebar{
  background:#111;
  border-right:1px solid #222;
  padding:14px 10px;
  position:sticky;
  top:100px;
  height:calc(100vh - var(--header-h, 100px));
  overflow-y:auto;
}

.search{
  width:100%;
  margin:0 0 12px 0;
}  
  
  .header{
  will-change: padding;
}

/* CONTENITORE FILTRI */
.filters{
  display:block;
  margin-top:10px;
}

/* BOTTONI FILTRO */
.filter{
  width:100%;
  height:34px;        /* 👈 più piccoli */
  margin-bottom:8px;
  padding:6px 10px;

  font-size:14px;
  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;
  background:#2c2c2e;
  border:1px solid rgba(255,255,255,0.08);
}

/* GRIGLIA ESERCIZI */
#app{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* GRIGLIA SCHEDA */
#scheda{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
  gap:20px;
  }
  .img-box{
  height:200px; /* 👈 più aria verticale */
}

.img-box img{
  transform: scale(1.25);
}

.card:hover .img-box img{
  transform: scale(1.35);
}
}
/* ===== HEADER VETRO RESPONSIVE ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px 10px; /* grande */
  background: rgba(20,20,20,0.45);
  backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  transition: transform 0.3s ease, padding 0.3s ease;
  border-bottom:none;
}
  
.header.hidden{
  transform: translateY(-100%);
}
  
/*header più piccolo*/
.header.small{
  padding:6px 10px;

  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}

/* ===== LOGO RESPONSIVE ===== */
.logo{
  width:100%;
  max-width:140px;
  height:auto;
  object-fit:contain;
  filter: brightness(0.75) contrast(1.2);
  opacity:0.95;
}

.header.small .logo{
  max-width:100px;
  transition: all 0.3s ease;
}  

/* 📱 MOBILE */
@media(max-width:600px){
  .header{
    padding:8px;
  }
  .logo{
    max-width:130px;
  }
  #app,
#scheda{
  gap:clamp(14px, 2vw, 20px); /* 👈 meno spacing in mobile */
}

.content{
  padding:22px 10px 14px; /* 👈 bilanciato mobile */
}
}

/* 💻 DESKTOP */
@media(min-width:1000px){
  .logo{
    max-width:240px;
}

.header.small .logo{
    max-width:160px;
  }  
  }
/* ===== BASE BUTTON (tutti uguali) ===== */
.btn{
  background: var(--accent);
  color: var(--card);

  border-radius:999px;

  height:26px;
  min-width:26px;
  padding:0 8px;


  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
 
  font-weight:600;
  line-height:1;

  cursor:pointer;
}

.btn svg{
  width:18px;
  height:18px;
 
  display:block;           /* 👈 FIX PRINCIPALE */
  margin:auto;             /* 👈 CENTRA PERFETTAMENTE */
} 

/* ===== RESET ===== */
.btn.reset{
  width:auto; /* 👈 NON più full width */
  height:28px;
  padding:0 12px;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;

  background: var(--accent);
  color: var(--card);

  border-radius:999px;
  margin:10px 0;

  font-size:16px;
}

.btn.reset svg{
  width:16px;
  height:16px;
  stroke: var(--card);
  transform: translateY(0.5px);
}

.actions{
  position:absolute;

  right:16px;

  /* 👇 POSIZIONE INTELLIGENTE */
  top: calc(14px + 20px - 14px); 
  /* padding + titolo + spazio */

  transform: translateY(-50%);

  display:flex;
  gap:6px;
}
 
</style>
</head>

let activeCategory="Tutti";
let scheda = JSON.parse(localStorage.getItem("scheda")) || [];

/* SAVE */
function saveScheda(){
localStorage.setItem("scheda", JSON.stringify(scheda));
}

/* TAB */
function showTab(tab){
  document.getElementById("eserciziTab").style.display="none";
  document.getElementById("schedaTab").style.display="none";

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  if(tab==="esercizi"){
    document.getElementById("eserciziTab").style.display="block";
    document.getElementById("tabE").classList.add("active");
  }else{
    document.getElementById("schedaTab").style.display="block";
    document.getElementById("tabS").classList.add("active");
  }
}

/* UPDATE */
function updateValue(i,f,v){
if(!scheda[i].values) scheda[i].values=[];
scheda[i].values[f]=v;
saveScheda();
}

function updateNote(i,v){
scheda[i].note=v;
saveScheda();
}

/* RENDER SCHEDA */
function renderScheda(){
const container=document.getElementById("scheda");
container.innerHTML="";

scheda.forEach((ex,index)=>{

const values = ex.values || [];

let html="";
ex.settings.forEach((s,i)=>{
html+=`
<div class="label">${s}</div>
<input 
value="${values[i] || ''}" 
oninput="updateValue(${index},${i},this.value)"
${ex.done ? "disabled" : ""}
>
`;
});

const div=document.createElement("div");
div.className="card" + (ex.done ? " done" : "");

div.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:flex-start;">
<span>${ex.name}</span>

<div class="actions ${ex.done ? 'disabled' : ''}">
<button class="btn" onclick="moveUp(${index})">
  <svg viewBox="0 0 24 24">
    <path d="M12 5L12 19M12 5L6 11M12 5L18 11"
      stroke="currentColor"
      stroke-width="2.8"
      stroke-linecap="round"/>
  </svg>
</button>

<button class="btn" onclick="moveDown(${index})">
  <svg viewBox="0 0 24 24">
    <path d="M12 19L12 5M12 19L6 13M12 19L18 13"
      stroke="currentColor"
      stroke-width="2.8"
      stroke-linecap="round"/>
  </svg>
</button>

<button class="btn" onclick="complete(${index})">
 <svg viewBox="0 0 24 24">
  <polyline points="6 12 10 16 18 8"
    fill="none"
    stroke="currentColor"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
</button>

<button class="btn" onclick="remove(${index})">
  <svg viewBox="0 0 24 24">
    <path d="M6 6L18 18M6 18L18 6"
      stroke="currentColor"
      stroke-width="2.8"
      stroke-linecap="round"/>
  </svg>
</button>
</div>
</div>

<div class="img-box">
  <img src="${ex.image}" onerror="this.src='images/default.png'">
</div>

${html}

<div class="label">Note</div>
<textarea 
oninput="updateNote(${index},this.value)"
${ex.done ? "disabled" : ""}
>${ex.note || ""}</textarea>
`;

container.appendChild(div);
});
}

/* AZIONI */
function remove(i){
scheda.splice(i,1);
saveScheda();
renderScheda();
}

function moveUp(i){
if(i>0){
[scheda[i], scheda[i-1]]=[scheda[i-1], scheda[i]];
saveScheda();
renderScheda();
}
}

function moveDown(i){
if(i<scheda.length-1){
[scheda[i], scheda[i+1]]=[scheda[i+1], scheda[i]];
saveScheda();
renderScheda();
}
}

function complete(i){
scheda[i].done = true;
saveScheda();
renderScheda();
}

function resetScheda(){
scheda.forEach(e=>e.done=false);
saveScheda();
renderScheda();
}

function resetDoneOnLoad(){
scheda.forEach(e => e.done = false);
saveScheda();
}

function addToSchedaByName(name){
const ex = exercises.find(e => e.name === name);

scheda.push({
...ex,
values:[],
note:"",
done:false,
id: Date.now() + Math.random()
});

saveScheda();
renderScheda();
showTab("scheda");
}

/* INIT */
resetDoneOnLoad();
renderFilters();
render();
renderScheda();

function fixLayout(){
  const header = document.querySelector(".header");
  const layout = document.querySelector(".layout");
  const sidebar = document.querySelector(".sidebar");

  if(header){
    const h = header.offsetHeight;
    document.documentElement.style.setProperty('--header-h', h + 'px');
    layout.style.paddingTop = (h + 10) + "px";

  if(window.innerWidth <= 600){
  sidebar.style.top = h + "px";
  } else
  {
  sidebar.style.top = h + "px"
}
  }
}

window.addEventListener("load", fixLayout);
window.addEventListener("resize", fixLayout);

let lastScroll = 0;

function handleHeader(){
  const header = document.querySelector(".header");
  const sidebar = document.querySelector(".sidebar");
  const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
  const isMobile = window.innerWidth <= 600;

 // header resize
  if(scrollTop > 30){
    header.classList.add("small");
  } else {
    header.classList.remove("small");
  }

  // 👇 SOLO MOBILE
  if(isMobile){
    if(scrollTop > 20){
      sidebar.classList.add("glass");
      sidebar.classList.add("shrink");
    } else {
      sidebar.classList.remove("glass");
      sidebar.classList.remove("shrink");
    }
  }

  fixLayout();
}

window.addEventListener("scroll", handleHeader);
window.addEventListener("touchmove", handleHeader);
window.addEventListener("load", handleHeader);

</script>
